# oh-my-posh configuration file - sable
# minimalistic single-line prompt with github dark dimmed colors
# layout: OS user 󰒋 host  ~/path  branch*⇡⇣ 󰌠 py 󱘗 rs❯      5s

console_title_template = '{{ .Folder }}'
version = 3
final_space = true

[palette]
# color palette: GitHub Dark Dimmed
gh_dimmed_red       = '#f47067'
gh_dimmed_orange    = '#daaa3f'
gh_dimmed_yellow    = '#c69026'
gh_dimmed_green     = '#57ab5a'
gh_dimmed_cyan      = '#39c5cf'
gh_dimmed_blue      = '#539bf5'
gh_dimmed_purple    = '#b083f0'
gh_dimmed_pink      = '#ff938a'
gh_dimmed_text      = '#adbac7'
gh_dimmed_subtext1  = '#909dab'
gh_dimmed_subtext0  = '#768390'
gh_dimmed_overlay2  = '#636e7b'
gh_dimmed_overlay1  = '#545d68'
gh_dimmed_overlay0  = '#444c56'
gh_dimmed_surface2  = '#373e47'
gh_dimmed_surface1  = '#2d333b'
gh_dimmed_surface0  = '#272e35'
gh_dimmed_base      = '#22272e'
gh_dimmed_mantle    = '#1c2128'
gh_dimmed_crust     = '#181d23'

[transient_prompt]
template = '❯ '
foreground = 'p:gh_dimmed_text'
background = 'transparent'
foreground_templates = ['{{ if gt .Code 0 }}p:gh_dimmed_red{{ end }}']

[secondary_prompt]
template = '❯❯ '
foreground = 'p:gh_dimmed_text'
background = 'transparent'

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

# [[blocks.segments]]
# type = 'os'
# style = 'plain'
# foreground = 'p:gh_dimmed_overlay1'
# background = 'transparent'
# template = '{{ .Icon }} '

[[blocks.segments]]
type = 'session'
style = 'plain'
foreground = 'p:gh_dimmed_overlay1'
background = 'transparent'
template = ' {{ (.UserName | splitList ".") | first | trunc 8 }} 󰒋 {{ (.HostName | splitList ".") | first | trunc 8 }}'

[[blocks.segments]]
type = 'path'
style = 'plain'
foreground = 'p:gh_dimmed_blue'
background = 'transparent'
template = ' <p:gh_dimmed_overlay1></> {{ .Path }}'

[blocks.segments.properties]
style = 'agnoster_short'
max_depth = 2
display_root = true
home_icon = '~'
folder_icon = ''
folder_separator_icon = '/'

[[blocks.segments]]
type = 'git'
style = 'plain'
foreground = 'p:gh_dimmed_green'
background = 'transparent'
template = '{{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }}{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}'
foreground_templates = [
  '{{ if or (.Working.Changed) (.Staging.Changed) }}p:gh_dimmed_yellow{{ end }}',
  '{{ if gt .Behind 0 }}p:gh_dimmed_red{{ end }}',
  '{{ if gt .Ahead 0 }}p:gh_dimmed_orange{{ end }}',
]

[blocks.segments.properties]
branch_icon = ' <p:gh_dimmed_overlay1></> '
commit_icon = '@'
fetch_status = true
branch_template = '{{ trunc 20 .Branch }}'

[[blocks.segments]]
type = 'python'
style = 'plain'
foreground = 'p:gh_dimmed_purple'
background = 'transparent'
template = ' <p:gh_dimmed_overlay1>󰌠</> {{ .Major }}.{{ .Minor }}'

[blocks.segments.properties]
display_mode = 'context'
tooling = ['uv']

[[blocks.segments]]
type = 'rust'
style = 'plain'
foreground = 'p:gh_dimmed_purple'
background = 'transparent'
template = ' <p:gh_dimmed_overlay1>󱘗</> {{ .Major }}.{{ .Minor }}'

[blocks.segments.properties]
display_mode = 'context'
tooling = ['rustc']

[[blocks.segments]]
type = 'status'
style = 'plain'
foreground = 'p:gh_dimmed_text'
background = 'transparent'
template = '❯'
foreground_templates = ['{{ if gt .Code 0 }}p:gh_dimmed_red{{ end }}']

[blocks.segments.properties]
always_enabled = true

[[blocks]]
type = 'rprompt'
alignment = 'right'
overflow = 'hidden'

[[blocks.segments]]
type = 'executiontime'
style = 'plain'
foreground = 'p:gh_dimmed_surface2'
background = 'transparent'
template = '{{ div .Ms 1000 }}s'

[blocks.segments.properties]
threshold = 5000

