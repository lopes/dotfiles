# oh-my-posh configuration file - sable
# minimalistic single-line prompt with catppuccin mocha colors
# layout: OS user 󰒋 host  ~/path  branch*⇡⇣ 󰌠 py 󱘗 rs❯      5s

console_title_template = '{{ .Folder }}'
version = 3
final_space = true

[palette]
# color palette: https://catppuccin.com/palette/
cp_mocha_rosewater = '#f5e0dc'
cp_mocha_flamingo  = '#f2cdcd'
cp_mocha_pink      = '#f5c2e7'
cp_mocha_mauve     = '#cba6f7'
cp_mocha_red       = '#f38ba8'
cp_mocha_maroon    = '#eba0ac'
cp_mocha_peach     = '#fab387'
cp_mocha_yellow    = '#f9e2af'
cp_mocha_green     = '#a6e3a1'
cp_mocha_teal      = '#94e2d5'
cp_mocha_sky       = '#89dceb'
cp_mocha_sapphire  = '#74c7ec'
cp_mocha_blue      = '#89b4fa'
cp_mocha_lavender  = '#b4befe'
cp_mocha_text      = '#cdd6f4'
cp_mocha_subtext1  = '#bac2de'
cp_mocha_subtext0  = '#a6adc8'
cp_mocha_overlay2  = '#9399b2'
cp_mocha_overlay1  = '#7f849c'
cp_mocha_overlay0  = '#6c7086'
cp_mocha_surface2  = '#585b70'
cp_mocha_surface1  = '#45475a'
cp_mocha_surface0  = '#313244'
cp_mocha_base      = '#1e1e2e'
cp_mocha_mantle    = '#181825'
cp_mocha_crust     = '#11111b'

[transient_prompt]
template = '❯ '
foreground = 'p:cp_mocha_text'
background = 'transparent'
foreground_templates = ['{{ if gt .Code 0 }}p:cp_mocha_red{{ end }}']

[secondary_prompt]
template = '❯❯ '
foreground = 'p:cp_mocha_text'
background = 'transparent'

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

# [[blocks.segments]]
# type = 'os'
# style = 'plain'
# foreground = 'p:cp_mocha_overlay1'
# background = 'transparent'
# template = '{{ .Icon }} '

[[blocks.segments]]
type = 'session'
style = 'plain'
foreground = 'p:cp_mocha_overlay1'
background = 'transparent'
template = ' {{ (.UserName | splitList ".") | first | trunc 8 }} 󰒋 {{ (.HostName | splitList ".") | first | trunc 8 }}'

[[blocks.segments]]
type = 'path'
style = 'plain'
foreground = 'p:cp_mocha_sapphire'
background = 'transparent'
template = ' <p:cp_mocha_overlay1></> {{ .Path }}'

[blocks.segments.properties]
style = 'agnoster_short'
max_depth = 2
display_root = true
home_icon = '~'
folder_icon = ''
folder_separator_icon = '/'

[[blocks.segments]]
type = 'git'
style = 'plain'
foreground = 'p:cp_mocha_green'
background = 'transparent'
template = '{{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }}{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}'
foreground_templates = [
  '{{ if or (.Working.Changed) (.Staging.Changed) }}p:cp_mocha_yellow{{ end }}',
  '{{ if gt .Behind 0 }}p:cp_mocha_red{{ end }}',
  '{{ if gt .Ahead 0 }}p:cp_mocha_peach{{ end }}',
]

[blocks.segments.properties]
branch_icon = ' <p:cp_mocha_overlay1></> '
commit_icon = '@'
fetch_status = true
branch_template = '{{ trunc 20 .Branch }}'

[[blocks.segments]]
type = 'python'
style = 'plain'
foreground = 'p:cp_mocha_mauve'
background = 'transparent'
template = ' <p:cp_mocha_overlay1>󰌠</> {{ .Major }}.{{ .Minor }}'

[blocks.segments.properties]
display_mode = 'context'
tooling = ['uv']

[[blocks.segments]]
type = 'rust'
style = 'plain'
foreground = 'p:cp_mocha_mauve'
background = 'transparent'
template = ' <p:cp_mocha_overlay1>󱘗</> {{ .Major }}.{{ .Minor }}'

[blocks.segments.properties]
display_mode = 'context'
tooling = ['rustc']

[[blocks.segments]]
type = 'status'
style = 'plain'
foreground = 'p:cp_mocha_text'
background = 'transparent'
template = '❯'
foreground_templates = ['{{ if gt .Code 0 }}p:cp_mocha_red{{ end }}']

[blocks.segments.properties]
always_enabled = true

[[blocks]]
type = 'rprompt'
alignment = 'right'
overflow = 'hidden'

[[blocks.segments]]
type = 'executiontime'
style = 'plain'
foreground = 'p:cp_mocha_surface2'
background = 'transparent'
template = '{{ div .Ms 1000 }}s'

[blocks.segments.properties]
threshold = 5000
